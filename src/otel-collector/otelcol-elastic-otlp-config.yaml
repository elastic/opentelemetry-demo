exporters:
  debug:
  otlphttp/elastic:
    endpoint: "YOUR_OTEL_EXPORTER_OTLP_ENDPOINT"
    headers:
      Authorization: "ApiKey YOUR_OTEL_EXPORTER_OTLP_API_KEY"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_GRPC}
      http:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  httpcheck/frontendproxy:
    targets:
      - endpoint: http://frontendproxy:${env:ENVOY_PORT}
  hostmetrics/system:
    collection_interval: 30s
    scrapers:
      disk:
      filesystem:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.logical.count:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      process:
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true
        metrics:
          process.threads:
            enabled: true
          process.open_file_descriptors:
            enabled: true
          process.memory.utilization:
            enabled: true
          process.disk.operations:
            enabled: true
      network:
      processes:
      load:

processors:
  batch:
  resourcedetection/system:
    detectors: ["system"]
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.name:
          enabled: true
        host.id:
          enabled: false
        host.arch:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.cache.l2.size:
          enabled: true
        os.description:
          enabled: true
        os.type:
          enabled: true
  
service:
  pipelines:
    logs:
      exporters:
        - debug
        - otlphttp/elastic
      processors:
        - batch
      receivers:
        - otlp
    metrics/infra/otel:
      exporters:
        - otlphttp/elastic
        - debug
      processors:
        - batch
        - resourcedetection/system
      receivers:
        - hostmetrics
    metrics:
      exporters:
        - otlphttp/elastic
        - debug
      processors:
        - batch
      receivers:
        - httpcheck/frontendproxy
        - otlp
    traces:
      exporters:
        - otlphttp/elastic
        - debug
      processors:
        - batch
      receivers:
        - otlp

