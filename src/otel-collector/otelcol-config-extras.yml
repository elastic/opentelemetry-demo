# extra settings to be merged into OpenTelemetry Collector configuration
# do not delete this file

## Example configuration for sending data to your own OTLP HTTP backend
## Note: the spanmetrics exporter must be included in the exporters array
## if overriding the traces pipeline.
##
#  exporters:
#    otlp_http/example:
#      endpoint: <your-endpoint-url>
#
#  service:
#    pipelines:
#      traces:
#        exporters: [spanmetrics, otlp_http/example]
# Elastic export configuration for upstream OpenTelemetry Demo
# Usage: Set ELASTIC_OTLP_ENDPOINT and ELASTIC_OTLP_API_KEY environment variables
exporters:
  otlphttp/elastic:
    endpoint: ${env:ELASTIC_OTLP_ENDPOINT}
    headers:
      Authorization: "ApiKey ${env:ELASTIC_OTLP_API_KEY}"
processors:
  resourcedetection:
    detectors: [env, docker, system]
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.name:
          enabled: true
        host.arch:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.model.name:
          enabled: true
        host.cpu.stepping:
          enabled: true
        host.cpu.cache.l2.size:
          enabled: true
        os.description:
          enabled: true
        os.type:
          enabled: true
service:
  pipelines:
    traces:
      exporters: [otlphttp/elastic, spanmetrics]
    metrics:
      exporters: [otlphttp/elastic]
    logs:
      exporters: [otlphttp/elastic]
